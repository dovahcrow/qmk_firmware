combos:
  - {p: [15, 16], k: "(", l: ["Normal"]} # df
  - {p: [19, 20], k: ")", l: ["Normal"]} # jk
  - {p: [14, 15], k: "[", l: ["Normal"]} # sd
  - {p: [20, 29], k: "]", l: ["Normal"]} # kn
  # - {p: [20, 21], k: "]", l: ["Normal"]} # kl

  - {p: [14, 16], k: ",", l: ["Normal"]} # sf
  # - {p: [19, 21], k: ".", l: ["Normal"]} # jl
  # - {p: [14, 15, 16], k: ",", l: ["Normal"]} # sdf
  # - {p: [19, 20, 21], k: "]", l: ["Normal"]} # jkl
  - {p: [19, 29], k: ".", l: ["Normal"]} # jn

  - {p: [3, 16], k: ";", l: ["Normal"]} # ef
  - {p: [19, 8], k: "'", l: ["Normal"]} # ji

  - {p: [3, 15], k: "=", l: ["Normal"]} # ed
  - {p: [15, 26], k: "-", l: ["Normal"]} # dc

  - {p: [16, 27], k: "\\", l: ["Normal"]} # fv
  - {p: [4, 16], k: "/", l: ["Normal"]} # rf

  - {p: [0, 1], k: "`", l: ["Normal"]} # tab q
  - {p: [1, 2], k: "1", l: ["Normal"]} # qw
  - {p: [2, 3], k: "2", l: ["Normal"]} # we
  - {p: [3, 4], k: "3", l: ["Normal"]} # er
